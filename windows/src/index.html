<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloudFriend</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">iCloudFriend Windows</p>
          <h1>照片备份接收端</h1>
        </div>
        <button id="refreshButton" class="button secondary">刷新</button>
      </header>

      <section class="dashboard">
        <article class="panel count-panel">
          <p class="kicker">照片数量</p>
          <div class="count-line">
            <span id="assetCount">0</span>
            <span class="slash">/</span>
            <span id="totalAssets">--</span>
          </div>
          <div class="count-labels">
            <span>已备份</span>
            <span>总数量</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="assetProgress" class="progress-fill"></div>
          </div>
          <p id="backupHint" class="hint">等待 iOS 设备连接并开始备份。</p>
        </article>

        <article class="panel device-panel">
          <p class="kicker">终端设备</p>
          <div class="info-row">
            <span>当前设备</span>
            <strong id="deviceName">暂无设备</strong>
          </div>
          <div class="info-row">
            <span>连接状态</span>
            <strong id="connectionState" class="state-pill waiting">未连接</strong>
          </div>
          <div class="info-row">
            <span>连接地址</span>
            <div class="address-line">
              <strong id="receiverState">启动中</strong>
              <button id="copyReceiverButton" class="button small secondary">复制</button>
            </div>
          </div>
        </article>
      </section>

      <section class="panel preview-panel">
        <div class="preview-header">
          <div>
            <p class="kicker">照片预览</p>
            <h2>最近备份照片</h2>
          </div>
          <span id="previewCount" class="preview-count">0 张</span>
        </div>
        <div id="photoGrid" class="photo-grid" aria-live="polite"></div>
        <p id="photoEmpty" class="hint preview-empty">备份完成后，这里会按照片时间倒序显示最近的照片。</p>
      </section>

      <section class="panel folder-panel">
        <div>
          <p class="kicker">Windows 备份目录</p>
          <strong id="backupRoot">Loading...</strong>
        </div>
        <div class="button-row">
          <button id="chooseFolderButton" class="button primary">修改目录</button>
          <button id="openFolderButton" class="button secondary">打开目录</button>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
    <script src="./renderer.js"></script>
  </body>
</html>
